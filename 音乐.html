        }

        body {

            color: #2c3e4f;
            padding: 0 12px 40px;
            min-height: 100vh;
        }

        .app-header {
            max-width: 1200px;
            margin: 0 auto 20px;
            padding: 16px 0 12px;
            border-bottom: 2px solid #e8ddd0;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }

        .app-header h1 {
            font-size: 22px;
            font-weight: 700;
            color: #7a4a3a;
            letter-spacing: 1px;
        }
        .app-header h1 span {
            font-weight: 300;
            color: #b28b7a;
            font-size: 14px;
            margin-left: 8px;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: #fff;
            border-radius: 30px;
            padding: 4px 14px 4px 18px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            border: 1px solid #e0d6cc;
        }
        .search-box input {
            border: none;
            outline: none;
            padding: 8px 0;
            font-size: 14px;
            width: 160px;
            background: transparent;
            color: #2c3e4f;
        }
        .search-box input::placeholder {
            color: #b8a99c;
        }
        .search-box button {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #7a4a3a;
            padding: 4px 0 4px 10px;
        }

        .category-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            max-width: 1200px;
            margin: 0 auto 16px;
        }
        .category-tabs button {
            padding: 6px 16px;
            border-radius: 30px;
            border: 1.5px solid #dccfc4;
            background: #fff;
            color: #5a4a3e;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .category-tabs button:hover {
            background: #f0e8e0;
        }
        .category-tabs button.active {
            background: #7a4a3a;
            color: #fff;
            border-color: #7a4a3a;
        }

        .stats {
            max-width: 1200px;
            margin: 0 auto 14px;
            font-size: 14px;
            color: #7a6a5e;
        }
        .stats strong {
            color: #7a4a3a;
        }

        .card-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 16px;
        }

        .music-card {
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
            padding: 16px 18px 18px;
            transition: transform 0.15s, box-shadow 0.2s;
            border: 1px solid #eee6de;
            display: flex;
            flex-direction: column;
        }
        .music-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.08);
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 6px;
            margin-bottom: 4px;
        }
        .card-title {
            font-size: 16px;
            font-weight: 700;
            color: #3d2c22;
            line-height: 1.3;
        }
        .card-badge {
            background: #efe6de;
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 10px;
            font-weight: 600;
            color: #6a5244;
            white-space: nowrap;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .card-composer {
            font-size: 13px;
            color: #7a6a5e;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .card-composer .label {
            color: #b09a8a;
            font-weight: 400;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin: 4px 0 8px;
        }
        .card-tags span {
            background: #f2ece6;
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 11px;
            color: #5a4a3e;
        }

        .card-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 2px;
        }
        .card-actions button {
            background: none;
            border: none;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            padding: 4px 0;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: color 0.2s;
            background: #f4efe9;
            padding: 4px 14px;
            border-radius: 30px;
            border: 1px solid #e0d6cc;
        }
        .card-actions .btn-style {
            color: #7a4a3a;
        }
        .card-actions .btn-style:hover {
            background: #7a4a3a;
            color: #fff;
            border-color: #7a4a3a;
        }
        .card-actions .btn-detail {
            color: #3a6a7a;
        }
        .card-actions .btn-detail:hover {
            background: #3a6a7a;
            color: #fff;
            border-color: #3a6a7a;
        }

            margin-top: 12px;
            padding-top: 12px;
            border-top: 1.5px dashed #e8ddd0;
            display: none;
            font-size: 13px;
            line-height: 1.7;
            color: #3d3a36;
        }
        .card-detail.open {
            display: block;
        }

        .detail-item {
            margin-bottom: 4px;
            display: flex;
            gap: 4px;
        }
        .detail-item .d-label {
            font-weight: 600;
            color: #6a5244;
            flex-shrink: 0;
            min-width: 50px;
        }
        .detail-item .d-value {
            color: #3d3a36;
        }

            margin-top: 12px;
            padding-top: 12px;
            border-top: 1.5px dashed #d0dce0;
            display: none;
            font-size: 14px;
            line-height: 1.8;
            color: #2a3a44;
            background: #f7fafc;
            padding: 14px 16px;
            border-radius: 10px;
            border-left: 4px solid #3a6a7a;
        }
        .card-advanced.open {
            display: block;
        }
        .card-advanced p {
            margin-bottom: 8px;
        }
        .card-advanced .adv-label {
            font-weight: 700;
            color: #1a4a5a;
            display: block;
            margin-bottom: 4px;
            font-size: 14px;
        }
        .card-advanced .adv-text {
            color: #2c3e4f;
        }

        .card-links {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;

            display: inline-flex;

            gap: 4px;

            padding: 4px 12px;

            font-size: 11px;
            color: #4a3a32;
            text-decoration: none;
            transition: background 0.2s, color 0.2s;
            border: 1px solid #e0d6cc;
        }
        .card-links a:hover {
            background: #7a4a3a;
            color: #fff;
            border-color: #7a4a3a;
        }

            font-size: 12px;
            color: #b09a8a;
            background: #f8f4f0;
            padding: 4px 12px;
            border-radius: 30px;
            border: 1px dashed #dccfc4;
        }

            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: #b09a8a;
            font-size: 16px;
        }

            .app-header {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }
            .app-header h1 {
                font-size: 20px;
            }

                margin-left: 0;
                font-size: 13px;

</head>

        let currentCategory = 'all';

        function getFilteredData() {
            return MUSIC_DATA.filter(item => {
                const matchCat = currentCategory === 'all' || item.category === currentCategory;
                const kw = searchKeyword.trim().toLowerCase();
                const matchSearch = !kw ||
                    item.title.toLowerCase().includes(kw) ||
                    item.composer.toLowerCase().includes(kw) ||
                    item.category.includes(kw);
                return matchCat && matchSearch;
            });
        }

        // 智能生成详细解析（回退方案）
        function generateDetailedNotes(item) {
            if (item.detailedNotes) return item.detailedNotes;
            const composerText = (item.composer && item.composer !== '作者不详') ? `由${item.composer}创作` :
                `流传于${item.region || '民间'}`;
            const genreText = item.genre || '一首经典音乐作品';
            const instrumentText = item.instruments ? `以${item.instruments}为主` : '以多种乐器演绎';
            const structureText = item.structure || '常规曲式结构';
            const moodText = item.mood || '情绪丰富多变';
            const rhythmText = item.rhythm || '节奏富有特色';
            const melodyText = item.melody || '旋律优美动听';
            const regionText = item.region ? `${item.region}地区` : '其地域';
            const firstInstrument = item.instruments ? item.instruments.split('、')[0] : '主奏乐器';

            return `《${item.title}》是${genreText}，${composerText}。演奏上${instrumentText}，采用${structureText}。全曲情绪${moodText}，节奏${rhythmText}，旋律${melodyText}。在幼儿音乐欣赏教学中，可重点引导幼儿感受${regionText}的音乐风格，辨识${firstInstrument}的音色特点，并尝试用身体律动或简单图谱来表现音乐中的节奏变化与情绪起伏，培养幼儿对音乐要素的敏锐感知力。`;
        }

        function render() {
            const filtered = getFilteredData();
            totalSpan.textContent = filtered.length;

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="empty-state">😕 没有找到匹配的曲目，试试其他关键词吧</div>`;
                return;
            }

            let html = '';
            filtered.forEach(item => {
                const tags = [];
                if (item.genre) tags.push(item.genre);
                if (item.instruments) tags.push(item.instruments.split('、')[0]);
                if (item.region) tags.push(item.region);

                let composerDisplay = item.composer || '作者不详';

                // 原风格要点
                const detailItems = [
                    { label: '体裁', value: item.genre || '—' },
                    { label: '乐器', value: item.instruments || '—' },
                    { label: '曲式', value: item.structure || '—' },
                    { label: '情绪', value: item.mood || '—' },
                    { label: '节奏', value: item.rhythm || '—' },
                    { label: '旋律', value: item.melody || '—' },
                    { label: '地域', value: item.region || '—' },
                ];

                let detailHtml = detailItems
                    .filter(d => d.value && d.value !== '—')
                    .map(d => `<div class="detail-item"><span class="d-label">${d.label}</span><span class="d-value">${d.value}</span></div>`)
                    .join('');

                // 详细解析（高级）
                const advancedText = generateDetailedNotes(item);

                // 链接
                let linksHtml = '';
                if (item.links && item.links.length > 0) {
                    item.links.forEach(link => {
                        linksHtml +=
                            `<a href="${link.url}" target="_blank" rel="noopener">▶ ${link.platform}</a>`;
                    });
                } else {
                    linksHtml = `<span class="local-hint">🎧 可在网易云/B站搜索试听</span>`;
                }

                html += `
                    <div class="music-card" data-id="${item.id}">
                        <div class="card-top">
                            <div class="card-title">${item.title}</div>
                            <span class="card-badge">${item.category}</span>
                        </div>
                        <div class="card-composer">
                            <span class="label">✏️</span> ${composerDisplay}
                        </div>
                        <div class="card-tags">
                            ${tags.map(t => `<span>${t}</span>`).join('')}
                        </div>

                        <div class="card-actions">
                            <button class="btn-style card-detail-toggle" data-target="${item.id}">
                                📖 风格要点
                            </button>
                            <button class="btn-detail card-advanced-toggle" data-target="${item.id}">
                                ✨ 详细解析
                            </button>
                        </div>

                        <!-- 原有风格要点 -->
                        <div class="card-detail" id="detail-${item.id}">
                            ${detailHtml}
                            <div class="card-links">
                                ${linksHtml}
                            </div>
                        </div>

                        <!-- 新增详细解析 -->
                        <div class="card-advanced" id="advanced-${item.id}">
                            <span class="adv-label">📝 深度复习笔记</span>
                            <p class="adv-text">${advancedText}</p>
                        </div>
                    </div>
                `;
            });

            grid.innerHTML = html;

            // 绑定原有风格要点切换
            document.querySelectorAll('.card-detail-toggle').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const targetId = this.dataset.target;
                    const detail = document.getElementById(`detail-${targetId}`);
                    if (detail) {
                        detail.classList.toggle('open');
                        this.textContent = detail.classList.contains('open') ? '📕 收起要点' : '📖 风格要点';
                    }
                });
            });

            // 绑定新增详细解析切换
            document.querySelectorAll('.card-advanced-toggle').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const targetId = this.dataset.target;
                    const adv = document.getElementById(`advanced-${targetId}`);
                    if (adv) {
                        adv.classList.toggle('open');
                        this.textContent = adv.classList.contains('open') ? '📕 收起解析' : '✨ 详细解析';
                    }
                });
            });
        }

        function doSearch() {
            searchKeyword = searchInput.value;
            render();
        }

        searchBtn.addEventListener('click', doSearch);
        searchInput.addEventListener('keyup', (e) => {
            if (e.key === 'Enter') doSearch();
        });

        tabs.forEach(tab => {
            tab.addEventListener('click', function() {
                tabs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                currentCategory = this.dataset.cat;
                render();
            });
        });

        render();
        console.log('🎵 幼儿音乐欣赏 · 复习助手已加载，共 ' + MUSIC_DATA.length + ' 首曲目');
    </script>
